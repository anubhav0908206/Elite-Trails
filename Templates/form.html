{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24×7 Help Support</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: #fff;
    }

    form {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px 50px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      width: 380px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 1.8em;
      color: #fff;
    }

    p {
      text-align: center;
      font-size: 0.9em;
      margin-bottom: 20px;
      color: #ddd;
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 12px;
      margin-bottom: 5px;
      font-size: 0.9em;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.9);
      font-size: 1em;
      color: #000;
      outline: none;
      transition: box-shadow 0.3s ease;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    input:focus,
    textarea:focus {
      box-shadow: 0 0 10px #00b7ff;
    }

    button {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #243b55;
      color: #fff;
      font-size: 1.1em;
      font-weight: bold;
      margin-top: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #1b2c40;
    }

    /* Optional loading effect */
    button:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      form {
        width: 90%;
        padding: 30px;
      }
    }
  </style>
</head>

<body>

  <!-- IMPORTANT: action must point to your Django URL -->
  <form method="post">
    {% csrf_token %}

    <h2>24×7 Help Support</h2>
    <p>We’re here to help you anytime. Submit your query below.</p>

    <label>Name</label>
    <input type="text" name="name" placeholder="Enter your name" required />

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required />

    <label>Contact</label>
    <input type="text" name="contact" placeholder="Enter your contact number" required />

    <label>Your Problem</label>
    <textarea name="message" placeholder="Write your query here..." required></textarea>

    <!-- Correct submit button -->
    <button type="submit">Submit</button>

  </form>

</body>
</html>
