{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Success</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #141e30, #243b55);
      }

      .card {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        animation: fadeIn 0.6s ease-in-out;
      }

      .message {
        font-size: 18px;
        color: #333;
        margin-bottom: 25px;
        line-height: 1.5;
      }

      .button {
        display: block;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #243b55;
        color: #fff;
        font-size: 1.05em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button:hover {
        background-color: #1b2c40;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="message">
        Details saved!<br />
        We’ll get in touch with you shortly.
      </div>

      <button class="button" onclick="goBack()">Back</button>
    </div>

    <script>
      function goBack() {
        window.history.back();
      }
    </script>
  </body>
</html>
