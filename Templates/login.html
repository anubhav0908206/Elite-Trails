{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Quicksand", sans-serif;
        background: url("{% static 'assets/login2.png' %}") no-repeat center center/cover;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Dim background */
      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.2);
        z-index: 0;
      }

      /* Main container */
      .container {
        position: relative;
        z-index: 1;
        width: 400px;
        padding: 40px;
        border-radius: 15px;
        backdrop-filter: blur(6px);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 6px 18px rgba(255, 255, 255, 0.3);
        text-align: center;
      }

      /* Logo + Title centered */
      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header img {
        height: 60px;
        display: block;
        margin: 0 auto 10px;
      }

      .header h1 {
        color: white;
        margin: 0;
      }

      /* Input section */
      .input-box {
        margin: 15px 0;
        text-align: left;
        color: white;
      }

      .input-box input {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: none;
        margin-top: 5px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
      }

      /* Links */
      .links {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
      }

      .links a {
        color: white;
        font-size: 16px;
        text-decoration: none;
      }
      .links a:hover {
        text-decoration: underline;
        color:#00b7ff;
      }

      /* Button */
      .btn {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        color: white;
        cursor:pointer;
        background-image: linear-gradient(to right, #1f1c2c, #928dab);
        transition: 0.4s;
      }

      .btn:hover {
        background: #00b7ff;
        box-shadow:
          0px 0px 15px #00b7ff,
          0px 0px 45px #00b7ff;
      }

      /* Messages */
      .message {
        color: red;
        font-size: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <img src="{% static 'assets/mountain.png' %}" />
        <h1>ELITE TRAILS</h1>
        <h2 style="color: white">Login</h2>
      </div>

      {% for M in messages %}
      <div class="message">{{ M }}</div>
      {% endfor %}

      <form method="post">
        {% csrf_token %}

        <div class="input-box">
          <label>Username</label>
          <input
            type="text"
            placeholder="Enter your username"
            name="username"
          />
        </div>

        <div class="input-box">
          <label>Password</label>
          <input
            type="password"
            placeholder="Enter your password"
            name="password"
          />
        </div>

        <div class="links">
          <a href="/forget">Forget Password</a>
          <a href="/register">Register</a>
        </div>

        <button type="submit" class="btn">Login</button>
      </form>
    </div>
  </body>
</html>
