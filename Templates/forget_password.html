{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forget Password</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Quicksand", sans-serif;
        background: url("{% static 'assets/login.png' %}") no-repeat center
          center/cover;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Background overlay */
      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 0;
      }

      /* Main container */
      .container {
        position: relative;
        z-index: 1;
        width: 430px;
        padding: 40px;
        border-radius: 15px;
        backdrop-filter: blur(6px);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 6px 18px rgba(255, 255, 255, 0.3);
        text-align: center;
      }

      /* Header */
      .header {
        margin-bottom: 20px;
      }

      .header img {
        height: 60px;
        display: block;
        margin: 0 auto 10px;
      }

      .header h1 {
        color: white;
        margin: 0;
      }

      .header h2 {
        color: white;
        margin-top: 10px;
      }

      /* Messages */
      .message {
        color: red;
        font-size: 18px;
        margin-bottom: 10px;
      }

      /* Input box */
      .input-box {
        margin: 15px 0;
        text-align: left;
        color: white;
      }

      .input-box input {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: none;
        margin-top: 5px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        outline: none;
      }

      .input-box input::placeholder {
        color: #ccc;
      }

      /* Button */
      .btn {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        color: white;
        cursor: pointer;
        background-image: linear-gradient(to right, #1f1c2c, #928dab);
        transition: 0.4s;
      }

      .btn:hover {
        background: #00b7ff;
        box-shadow:
          0px 0px 15px #00b7ff,
          0px 0px 45px #00b7ff;
      }

      /* Back link */
      .back-link {
        margin-top: 18px;
      }

      .back-link a {
        color: white;
        text-decoration: none;
        font-size: 16px;
      }

      .back-link a:hover {
        text-decoration: underline;
        color:#00b7ff;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <img src="{% static 'assets/travel.png' %}" alt="Logo" />
        <h1>ELITE TRAILS</h1>
        <h2>Forget Password</h2>
      </div>

      {% for M in messages %}
      <div class="message">{{ M }}</div>
      {% endfor %}

      <form method="post">
        {% csrf_token %}

        <div class="input-box">
          <label>Username</label>
          <input
            type="text"
            name="username"
            placeholder="Enter your username"
            required
          />
        </div>

        <div class="input-box">
          <label>Email</label>
          <input
            type="email"
            name="email"
            placeholder="Enter your registered email"
            required
          />
        </div>

        <div class="input-box">
          <label>New Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter new password"
            required
          />
        </div>

        <div class="input-box">
          <label>Confirm Password</label>
          <input
            type="password"
            name="cpassword"
            placeholder="Confirm new password"
            required
          />
        </div>

        <button type="submit" class="btn">Update Password</button>
      </form>

      <div class="back-link">
        <a href="/login">Remember password</a>
      </div>
    </div>
  </body>
</html>
